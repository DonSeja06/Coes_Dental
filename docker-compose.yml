version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: coesdental-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: consultorioCoesDental
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coesdental-backend
    environment:
      - DB_HOST=db
      - DB_PASSWORD=root
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-coesdental
      dockerfile: Dockerfile
    container_name: coesdental-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
