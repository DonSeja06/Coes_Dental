<div class="container-fluid py-3">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="text-primary-medical fw-bold mb-0">Gestión de Recepcionistas</h3>
        <button class="btn btn-primary-medical rounded-3 shadow-sm" data-bs-toggle="modal"
            data-bs-target="#modalNuevoRecepcionista" (click)="abrirModalNuevo()">
            <i class="bi bi-plus-lg me-1"></i> Nueva Recepcionista
        </button>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-muted">
                        <tr>
                            <th class="ps-4">DNI</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Teléfono</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>

                        <tr *ngIf="cargando">
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border text-primary-medical" role="status">
                                    <span class="visually-hidden">Cargando...</span>
                                </div>
                                <p class="text-muted mt-2">Cargando recepcionistas...</p>
                            </td>
                        </tr>

                        <ng-container *ngIf="!cargando">
                            <tr *ngFor="let r of listaRecepcionistas">
                                <td class="ps-4 fw-bold text-primary-medical">{{ r.dni || r.DNI }}</td>
                                <td>{{ r.nombre }}</td>
                                <td>{{ r.correo }}</td>
                                <td>{{ r.telefono || 'N/A' }}</td>
                                <td>
                                    <span class="badge rounded-pill px-3 bg-success">
                                        {{ r.estado }}
                                    </span>
                                </td>
                            </tr>
                        </ng-container>

                        <tr *ngIf="!cargando && listaRecepcionistas.length === 0">
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                No hay recepcionistas registrados.
                            </td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNuevoRecepcionista" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">

            <div class="modal-header bg-primary-medical text-white border-0">
                <h5 class="modal-title fw-bold">
                    <i class="bi bi-person-plus"></i>
                    Registrar Recepcionista
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>

            <div class="modal-body p-4">
                <form [formGroup]="recepcionistaForm">

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-primary-medical">DNI</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="bi bi-person-vcard text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" formControlName="DNI"
                                placeholder="Ej. 12345678" maxlength="8">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-primary-medical">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" formControlName="nombre"
                                placeholder="Nombres y Apellidos">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold text-primary-medical">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-start-0" formControlName="correo"
                                    placeholder="correo@ejemplo.com">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold text-primary-medical">Teléfono (Opcional)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-telephone text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" formControlName="telefono"
                                    placeholder="Ej. 987654321" maxlength="9">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-primary-medical">Contraseña del Sistema</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="bi bi-key text-muted"></i></span>
                            <input type="password" class="form-control border-start-0" formControlName="password"
                                placeholder="Contraseña para portal">
                        </div>
                    </div>

                </form>
            </div>

            <div class="modal-footer border-0 bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                    id="btnCerrarModal">Cancelar</button>
                <button type="button" class="btn btn-primary-medical" (click)="guardarRecepcionista()"
                    [disabled]="recepcionistaForm.invalid">
                    Guardar Recepcionista
                </button>
            </div>

        </div>
    </div>
</div>
